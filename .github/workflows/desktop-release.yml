name: Release Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.2.0). Required for manual runs.'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - platform: windows-latest
            rust_targets: ''
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: pnpm install --frozen-lockfile

      # Build sidecars (echomind-server + bun-compiled bot) for every triple in
      # the bundle. macOS universal needs both Apple targets; Windows needs the
      # MSVC triple. The build script honours TARGET_TRIPLE.
      - name: Build sidecars (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          TARGET_TRIPLE: x86_64-pc-windows-msvc
        run: node scripts/build-sidecars.mjs

      - name: Build sidecars (macOS — universal via lipo)
        if: matrix.platform == 'macos-latest'
        env:
          TARGET_TRIPLE: universal-apple-darwin
        run: node scripts/build-sidecars.mjs

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — must be present for Tauri to produce .sig files
          # next to bundles. Without these envs `createUpdaterArtifacts: true`
          # would still build installers but skip signature generation, and
          # mirror's latest.json step would have nothing to sign with.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: 'EchoMind ${{ inputs.tag || github.ref_name }}'
          releaseBody: |
            桌面安装包（自动构建）。

            - Windows: `.msi` / `.exe`
            - macOS: `.dmg`（universal: Intel + Apple Silicon）

            首次启动需在「设置 → LLM」配置 API Key。微信桥与 Cloud Bridge 均为可选。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Also upload bundles as workflow artifacts so the mirror job can pick
      # them up without depending on the draft release's API visibility (which
      # was the source of "release not found" failures). Includes .sig + the
      # macOS .app.tar.gz updater payload so the mirror job can assemble
      # latest.json without going back to the bundler.
      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.exe.sig
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.app.tar.gz.sig
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.app.tar.gz.sig
          if-no-files-found: warn
          retention-days: 7

  # Mirror the built binaries to the public EchoMind-releases repo so that
  # external testers can download without needing access to the private source.
  # Runs after both matrix builds finish. Pulls binaries from workflow
  # artifacts (not from the draft release) for reliability.
  mirror:
    name: Mirror to public releases repo
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: bundle-*
          merge-multiple: true

      - name: Collect installers + updater payloads to flat ./assets
        run: |
          mkdir -p ./assets
          # User-facing installers
          find ./artifacts -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' \) \
            -exec cp -v {} ./assets/ \;
          # Updater payloads + signatures (Windows uses the NSIS .exe directly,
          # macOS needs the .app.tar.gz because the updater swaps the .app bundle)
          find ./artifacts -type f \( -name '*.exe.sig' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \) \
            -exec cp -v {} ./assets/ \;
          echo "--- ./assets ---"
          ls -lh ./assets || true
          test -n "$(ls -A ./assets 2>/dev/null)" || { echo "::error::No installers found in artifacts"; exit 1; }

      # Build latest.json that the Tauri updater plugin polls. Constructed
      # here (not pulled from the private draft release) so the URLs point
      # directly at the public release assets that users actually download.
      - name: Generate latest.json for Tauri updater
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          VERSION="${TAG#v}"
          PUB_REL_BASE="https://github.com/Qc-riviere/EchoMind-releases/releases/download/$TAG"

          WIN_INSTALLER=$(ls ./assets/*x64-setup.exe 2>/dev/null | head -1 || true)
          WIN_SIG_FILE=$(ls ./assets/*x64-setup.exe.sig 2>/dev/null | head -1 || true)
          MAC_TAR=$(ls ./assets/*.app.tar.gz 2>/dev/null | head -1 || true)
          MAC_SIG_FILE=$(ls ./assets/*.app.tar.gz.sig 2>/dev/null | head -1 || true)

          if [ -z "$WIN_SIG_FILE" ] || [ -z "$MAC_SIG_FILE" ] || [ -z "$WIN_INSTALLER" ] || [ -z "$MAC_TAR" ]; then
            echo "::warning::Missing updater artifacts — skipping latest.json so users keep current version"
            echo "  WIN_INSTALLER=$WIN_INSTALLER"
            echo "  WIN_SIG_FILE=$WIN_SIG_FILE"
            echo "  MAC_TAR=$MAC_TAR"
            echo "  MAC_SIG_FILE=$MAC_SIG_FILE"
            exit 0
          fi

          WIN_SIG=$(cat "$WIN_SIG_FILE")
          MAC_SIG=$(cat "$MAC_SIG_FILE")
          WIN_NAME=$(basename "$WIN_INSTALLER")
          MAC_NAME=$(basename "$MAC_TAR")

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg notes "见 release 说明" \
            --arg win_sig "$WIN_SIG" \
            --arg win_url "$PUB_REL_BASE/$WIN_NAME" \
            --arg mac_sig "$MAC_SIG" \
            --arg mac_url "$PUB_REL_BASE/$MAC_NAME" \
            '{
              version: $version,
              pub_date: $pub_date,
              notes: $notes,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "darwin-x86_64":  { signature: $mac_sig, url: $mac_url },
                "darwin-aarch64": { signature: $mac_sig, url: $mac_url }
              }
            }' > ./assets/latest.json
          echo "--- latest.json ---"
          cat ./assets/latest.json

      - name: Mirror to EchoMind-releases
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          PUBLIC_REPO="Qc-riviere/EchoMind-releases"
          NOTES=$(cat <<EOF
          自动镜像自私有 build。

          详见 [README](https://github.com/Qc-riviere/EchoMind-releases#readme) 与 [上手文档](https://github.com/Qc-riviere/EchoMind-releases/blob/main/docs/getting-started.md)。

          - **Windows**: 下载 \`.exe\` → 双击 → SmartScreen 拦截点「更多信息」→「仍要运行」
          - **macOS**: 下载 \`.dmg\` → 拖入 Applications → 首次启动**右键 →「打开」→「打开」**（暂未做 Apple 签名）

          反馈：[Issues](https://github.com/Qc-riviere/EchoMind-releases/issues/new)
          EOF
          )
          if gh release view "$TAG" --repo "$PUBLIC_REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists in $PUBLIC_REPO — uploading binaries with --clobber"
            gh release upload "$TAG" --repo "$PUBLIC_REPO" --clobber ./assets/*
          else
            echo "Creating new release $TAG in $PUBLIC_REPO"
            gh release create "$TAG" \
              --repo "$PUBLIC_REPO" \
              --title "EchoMind $TAG" \
              --notes "$NOTES" \
              ./assets/*
          fi
