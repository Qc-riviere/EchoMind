name: Build & publish bridge images

on:
  push:
    branches: [master]
    paths:
      - 'src-tauri/echomind-bridge-server/**'
      - 'src-tauri/echomind-core/**'
      - 'src-tauri/Cargo.toml'
      - 'src-tauri/Cargo.lock'
      - 'echomind-wechat/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: qc-riviere

jobs:
  bridge:
    name: bridge server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: src-tauri
          file: src-tauri/echomind-bridge-server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/echomind-bridge:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/echomind-bridge:${{ github.sha }}
          cache-from: type=gha,scope=bridge
          cache-to: type=gha,mode=max,scope=bridge

  bot:
    name: wechat bot
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: echomind-wechat
          file: echomind-wechat/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/echomind-wechat:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/echomind-wechat:${{ github.sha }}
          cache-from: type=gha,scope=bot
          cache-to: type=gha,mode=max,scope=bot
