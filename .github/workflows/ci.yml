name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel in-flight runs when a new commit lands on the same ref — saves CI
# minutes on push-heavy days.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: cargo test (workspace minus tauri main)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Scope to echomind-core where every D1 test lives. The `echomind`
      # main crate pulls tauri / webkit2gtk; `echomind-server` pulls
      # keyring → libdbus-sys → libdbus-1-dev apt — neither has any tests
      # of its own, so testing them just makes CI slower and brittle to
      # Linux-specific system deps. The full desktop build is exercised
      # by desktop-release.yml on tagged releases.
      - name: cargo test
        working-directory: src-tauri
        run: cargo test -p echomind-core --locked
