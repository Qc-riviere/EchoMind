<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EchoMind — Cognitive Sanctuary</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
    <style>
      /* Splash shown immediately while Webview2 + the React bundle boot.
         Removed by main.tsx once React mounts. Kept inline so it paints
         in the very first frame — no flash of transparent window. */
      html, body { margin: 0; background: #131313; }
      #splash {
        position: fixed; inset: 0;
        background: #131313;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 1.5rem;
        font-family: ui-sans-serif, system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
        z-index: 9999;
        transition: opacity 240ms ease;
      }
      #splash.done { opacity: 0; pointer-events: none; }
      #splash .brand {
        font-size: 1.5rem;
        letter-spacing: 0.25em;
        font-weight: 600;
        color: #adc7ff;
      }
      #splash .bar {
        width: 240px; height: 3px;
        border-radius: 2px;
        background: rgba(173, 199, 255, 0.15);
        overflow: hidden;
      }
      #splash .fill {
        height: 100%; width: 0%;
        background: #adc7ff;
        animation: splash-fill 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes splash-fill {
        0%   { width: 0%; }
        40%  { width: 35%; }
        70%  { width: 70%; }
        100% { width: 92%; }
      }
      #splash .msg {
        font-size: 0.72rem;
        letter-spacing: 0.15em;
        color: rgba(173, 199, 255, 0.5);
      }
    </style>
  </head>

  <body>
    <div id="splash" role="status" aria-live="polite" aria-label="EchoMind 加载中">
      <div class="brand">EchoMind</div>
      <div class="bar"><div class="fill"></div></div>
      <div class="msg">正在唤醒灵感笔记…</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
